<!DOCTYPE html>
<html>
<head>
    <title>Result</title>
</head>
<body>

<h2>Detection Result</h2>

<div id="output"></div>

<script>
    const data = JSON.parse(localStorage.getItem("result"));

    if (data) {
        document.getElementById("output").innerHTML =
            "<pre>" + JSON.stringify(data, null, 2) + "</pre>";
    }
</script>

</body>
</html>
